{% extends 'base.html' %}
{% block title %}AI Assistant | SafeWeb IDS{% endblock %}
{% block content %}
<div class="container py-4 animate-fadeIn">
    <h1 class="text-center mb-4 cyber-title"><i class="fas fa-robot me-2"></i>AI Assistant</h1>

    <div class="card shadow glass-panel" style="height:70vh;">
        <div class="card-body d-flex flex-column">
            <div id="chatBox" class="flex-grow-1 overflow-auto mb-3 p-3 glass-panel-soft">
                <div class="text-muted text-center">Ask anything – I can open pages or answer basic questions.</div>
            </div>
            <div class="input-group">
                <input type="text" id="chatInput" class="form-control" placeholder="Type a message..."
                       aria-label="Message" onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn btn-primary" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
function addMessage(txt, sender='user'){
    const box=document.getElementById('chatBox');
    const div=document.createElement('div');
    div.className=`mb-2 ${sender==='bot'?'text-start':'text-end'}`;
    const bubble=document.createElement('div');
    const bubbleClass = sender==='bot' ? 'glass-panel-soft text-info' : 'bg-primary text-dark';
    bubble.className=`d-inline-block p-2 rounded-3 ${bubbleClass}`;
    bubble.innerHTML=txt;
    div.appendChild(bubble);
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}
function sendChat(){
    const input=document.getElementById('chatInput');
    const q=input.value.trim(); if(!q) return;
    addMessage(q,'user'); input.value='';
    // reuse same logic as modal
    const pages={dashboard:'/dashboard','packet analysis':'/packet-analysis','ml predictions':'/ml-predictions',
                 visualizations:'/visualizations','saved captures':'/saved-captures',settings:'/settings','ai assistant':'/ai-assistant'};
    for(const k in pages){
        if(q.toLowerCase().includes('open '+k)||q.toLowerCase()===k){
            addMessage(`Opening <b>${k}</b>...`,'bot');
            setTimeout(()=>location.href=pages[k],1200); return;
        }
    }
    const demos={ 'what is this project':'SafeWeb IDS – Flask-based IDS with ML & rule-engine.',
                  'who made you':'Created by Asmit Kumar & contributors.',
                  'how to use':'Navigate via navbar or ask me to open a page.'};
    for(const key in demos) if(q.toLowerCase().includes(key)){
        addMessage(demos[key],'bot'); return;
    }
    addMessage('I can open pages or answer basic questions.','bot');
}
</script>
{% endblock %}

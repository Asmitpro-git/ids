<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Predictions | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-4 text-center animate-slideUp" style="color:#22223b;"><i class="fas fa-brain me-2"></i>ML Predictions</h1>
    <div id="summary-cards" class="row mb-4 g-3 justify-content-center"></div>
    <div class="card mb-4 shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-chart-doughnut me-2"></i>Anomaly vs Normal</h4>
            <canvas id="anomalyChart" height="120" aria-label="Anomaly vs Normal" role="img"></canvas>
        </div>
    </div>
    <form class="row g-3 mb-4 align-items-end animate-fadeIn" id="filterForm">
        <div class="col-md-4">
            <label for="protocol" class="form-label">Protocol</label>
            <select class="form-select" name="protocol" id="protocol">
                <option value="">All</option>
                <option value="TCP">TCP</option>
                <option value="UDP">UDP</option>
                <option value="ICMP">ICMP</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="ip_search" class="form-label">IP Search</label>
            <input type="text" class="form-control" name="ip_search" id="ip_search" placeholder="e.g. 192.168.1.10">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary"><i class="fas fa-filter me-1"></i>Filter</button>
        </div>
    </form>
    <div class="row mb-2 justify-content-end">
        <div class="col-auto">
            <button class="btn btn-outline-success w-100" onclick="downloadCSV()"><i class="fas fa-download me-1"></i>CSV</button>
        </div>
    </div>
    <div class="card shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-table me-2"></i>Predictions Table</h4>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="predictionsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Timestamp</th><th>Source IP</th><th>Dest IP</th>
                            <th>Protocol</th><th>Label</th><th>Confidence</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

// TODO: Implement filter and table rendering
function downloadCSV(){

    alert('CSV export not implemented.');
}
</script>
</body>
</html>

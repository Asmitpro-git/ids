<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packet Analysis | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-4 text-center animate-slideUp"><i class="fas fa-search me-2"></i>Packet Analysis</h1>
    <div id="summary-cards" class="row mb-4 g-3 justify-content-center"></div>
    <div class="card mb-4 shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-chart-pie me-2"></i>Protocol Distribution</h4>
            <canvas id="protocolChart" height="120" aria-label="Protocol Distribution" role="img"></canvas>
        </div>
    </div>
    <form class="row g-3 mb-4 align-items-end animate-fadeIn" id="filterForm">
        <div class="col-md-3">
            <label for="protocol" class="form-label">Protocol</label>
            <select class="form-select" name="protocol" id="protocol">
                <option value="">All</option>
                <option value="TCP">TCP</option>
                <option value="UDP">UDP</option>
                <option value="ICMP">ICMP</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="threat" class="form-label">Threat Level</label>
            <select class="form-select" name="threat" id="threat">
                <option value="">All</option>
                <option value="1">Threat</option>
                <option value="0">Safe</option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="ip_search" class="form-label">Search IP</label>
            <input type="text" class="form-control" name="ip_search" id="ip_search" placeholder="e.g. 192.168.1.10">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary"><i class="fas fa-filter me-1"></i>Filter</button>
        </div>
    </form>
    <div class="card shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-table me-2"></i>Analyzed Packets</h4>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="packetsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Timestamp</th><th>Source IP</th><th>Dest IP</th>
                            <th>Protocol</th><th>Length</th><th>Threat</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Fetch summary and chart data from backend API
fetch('/api/packet-analysis-summary').then(r=>r.json()).then(summary=>{
    const cards=[
        ['Total Packets',summary.total_packets,'primary'],
        ['Threats Detected',summary.threats_detected,'warning'],
        ['ML Anomalies',summary.ml_anomalies,'danger'],
        ['Protocols',summary.protocols,'info']
    ];
    let html='';
    for(const [title,val,color] of cards){
        html+=`<div class="col-md-3"><div class="card text-white shadow animate-fadeIn"><div class="card-body text-center"><h5 class="card-title" style="color:#22223b;">${title}</h5><p class="display-6" style="color:#22223b;">${val}</p></div></div></div>`;
    }
    document.getElementById('summary-cards').innerHTML=html;
});
fetch('/api/packet-analysis-protocols').then(r=>r.json()).then(data=>{
    const ctx=document.getElementById('protocolChart').getContext('2d');
    const labels=Object.keys(data), vals=Object.values(data);
    const colors=['#007bff','#28a745','#dc3545','#ffc107','#17a2b8','#6610f2','#fd7e14','#6f42c1','#20c997','#e83e8c'];
    new Chart(ctx,{type:'pie',data:{labels,datasets:[{data:vals,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
        options:{plugins:{legend:{position:'bottom'}},animation:{duration:1500,easing:'easeOutBounce'}}});
});
function renderPacketsTable(packets){
    const tbody=document.querySelector('#packetsTable tbody');
    tbody.innerHTML='';
    if(!packets.length){
        tbody.innerHTML='<tr><td colspan="6" class="text-center">No packets</td></tr>';
        return;
    }
    for(const pkt of packets){
        tbody.innerHTML+=`<tr><td>${pkt.timestamp}</td><td>${pkt.src_ip}</td><td>${pkt.dst_ip}</td><td>${pkt.protocol}</td><td>${pkt.packet_size}</td><td>${pkt.threat?'<span class=\"badge bg-danger\">Threat</span>':'<span class=\"badge bg-success\">Safe</span>'}</td></tr>`;
    }
}
function fetchPackets(){
    const params=new URLSearchParams({
        protocol:document.getElementById('protocol').value,
        threat:document.getElementById('threat').value,
        ip_search:document.getElementById('ip_search').value
    });
    fetch('/api/packet-analysis-packets?'+params.toString())
        .then(r=>r.json())
        .then(renderPacketsTable);
}
document.getElementById('filterForm').addEventListener('submit',e=>{
    e.preventDefault();
    fetchPackets();
});
fetchPackets();
</script>
</body>
</html>

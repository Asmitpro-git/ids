<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h2, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container">
    <div class="row justify-content-center mt-5 animate-slideUp">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4"><i class="fas fa-sign-in-alt me-2"></i>Login</h2>
                    <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                        </li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
                                    <a href="#" class="btn btn-danger"><i class="fab fa-google me-2"></i>Google</a>
                                    <a href="#" class="btn btn-dark"><i class="fab fa-github me-2"></i>GitHub</a>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="new_username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="new_username" name="new_username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="new_password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="new_password" name="new_password" required>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success"><i class="fas fa-user-plus me-2"></i>Register</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div id="errorMsg" class="alert alert-danger mt-3 animate__animated animate__fadeIn" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
    e.preventDefault();
    // TODO: Implement login API call
    document.getElementById('errorMsg').style.display='block';
    document.getElementById('errorMsg').textContent='Login API not implemented.';
});
document.getElementById('registerForm').addEventListener('submit',function(e){
    e.preventDefault();
    // TODO: Implement register API call
    document.getElementById('errorMsg').style.display='block';
    document.getElementById('errorMsg').textContent='Register API not implemented.';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-4 text-center animate-slideUp" style="color:#22223b;"><i class="fas fa-cog me-2"></i>Settings</h1>
    <div id="summary-cards" class="row mb-4 g-3 justify-content-center"></div>
    <div class="card shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-sliders-h me-2"></i>Update Configuration</h4>
            <form id="settingsForm" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">DDoS Packets</label>
                    <input type="number" class="form-control" name="ddos_packet_count" id="ddos_packet_count" min="1">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Port Scan Ports</label>
                    <input type="number" class="form-control" name="port_scan_ports" id="port_scan_ports" min="1">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Brute-Force POSTs</label>
                    <input type="number" class="form-control" name="brute_force_post_count" id="brute_force_post_count" min="1">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Notification Email</label>
                    <input type="email" class="form-control" name="notification_email" id="notification_email" placeholder="admin@example.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label">ML Model</label>
                    <select class="form-select" name="ml_model" id="ml_model">
                        <option value="isolation_forest">Isolation Forest</option>
                        <option value="random_forest">Random Forest</option>
                        <option value="svm">SVM</option>
                    </select>
                    <hr>
                    <label class="form-label mt-2">Upload .pkl Model</label>
                    <input type="file" class="form-control" name="model_file" id="model_file" accept=".pkl">
                    <div class="d-flex gap-2 mt-2">
                        <button type="button" class="btn btn-outline-info flex-fill" id="uploadModelBtn"><i class="fas fa-upload me-1"></i>Upload</button>
                        <button type="button" class="btn btn-outline-success flex-fill" id="retrainModelBtn"><i class="fas fa-sync me-1"></i>Retrain</button>
                    </div>
                </div>
                <div class="col-12 d-grid gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Settings</button>
                    <button type="button" class="btn btn-outline-warning" id="restoreDefaultsBtn"><i class="fas fa-undo me-1"></i>Restore Defaults</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
// TODO: Fetch and populate settings from backend API
// TODO: Implement form submission to backend API
</script>
</body>
</html>

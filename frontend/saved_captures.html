<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Captures | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-4 text-center animate-slideUp" style="color:#22223b;"><i class="fas fa-save me-2"></i>Saved Captures</h1>
    <div id="summary-cards" class="row mb-4 g-3 justify-content-center"></div>
    <form class="row g-3 mb-4 align-items-end animate-fadeIn" id="filterForm">
        <div class="col-md-5">
            <label for="filename_search" class="form-label">Filename</label>
            <input type="text" class="form-control" name="filename_search" id="filename_search" placeholder="e.g. capture_2024.pcap">
        </div>
        <div class="col-md-4">
            <label for="date_search" class="form-label">Date</label>
            <input type="date" class="form-control" name="date_search" id="date_search">
        </div>
        <div class="col-md-3 d-grid">
            <button type="submit" class="btn btn-primary"><i class="fas fa-filter me-1"></i>Filter</button>
        </div>
    </form>
    <div class="card shadow animate-slideUp">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center"><i class="fas fa-table me-2"></i>Capture List</h4>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="capturesTable">
                    <thead class="table-dark">
                        <tr><th>Filename</th><th>Date</th><th>Size</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
fetch('/api/saved-captures-summary').then(r=>r.json()).then(summary=>{
    const cards=[
        ['Total Captures',summary.total_captures,'primary'],
        ['Total Size',summary.total_size,'info'],
        ['Last Saved',summary.last_saved,'success']
    ];
    let html='';
    for(const [title,val,color] of cards){
        html+=`<div class="col-md-4"><div class="card bg-${color} text-white shadow animate-fadeIn"><div class="card-body text-center"><h5 style="color:#22223b;">${title}</h5><p class="display-6" style="color:#22223b;">${val}</p></div></div></div>`;
    }
    document.getElementById('summary-cards').innerHTML=html;
});
function renderCapturesTable(captures){
    const tbody=document.querySelector('#capturesTable tbody');
    tbody.innerHTML='';
    if(!captures.length){
        tbody.innerHTML='<tr><td colspan="4" class="text-center">No captures</td></tr>';
        return;
    }
    for(const c of captures){
        tbody.innerHTML+=`<tr><td class="text-break">${c.filename}</td><td>${c.date}</td><td>${c.size}</td><td><a href="/api/download-capture?filename=${encodeURIComponent(c.filename)}" class="btn btn-sm btn-outline-success me-2"><i class="fas fa-download"></i></a><button class="btn btn-sm btn-outline-danger" onclick="deleteCapture('${c.filename}')"><i class="fas fa-trash"></i></button></td></tr>`;
    }
}
function fetchCaptures(){
    const params=new URLSearchParams({
        filename_search:document.getElementById('filename_search').value,
        date_search:document.getElementById('date_search').value
    });
    fetch('/api/saved-captures-list?'+params.toString())
        .then(r=>r.json())
        .then(renderCapturesTable);
}
document.getElementById('filterForm').addEventListener('submit',e=>{
    e.preventDefault();
    fetchCaptures();
});
function deleteCapture(filename){
    if(!confirm('Delete '+filename+'?')) return;
    fetch('/api/delete-capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename})})
        .then(r=>r.json())
        .then(fetchCaptures);
}
fetchCaptures();
</script>
</body>
</html>

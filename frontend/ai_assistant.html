<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | SafeWeb IDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body { background: #f8fafc; color: #22223b; font-family: 'Inter', Arial, sans-serif; }
        h1, h4, h5 { color: #22223b; }
        .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(99,102,241,0.08); }
        .navbar { background: #fff; color: #22223b; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-shield-alt me-2"></i>SafeWeb IDS</a>
    </div>
</nav>
<div class="container py-4 animate-fadeIn">
    <h1 class="text-center mb-4" style="color:#22223b;"><i class="fas fa-robot me-2"></i>AI Assistant</h1>
    <div class="card shadow" style="height:70vh;">
        <div class="card-body d-flex flex-column">
            <div id="chatBox" class="flex-grow-1 overflow-auto mb-3 p-3" style="background:#f8f9fa;border-radius:8px;">
                <div class="text-muted text-center">Ask anything – I can open pages or answer basic questions.</div>
            </div>
            <div class="input-group">
                <input type="text" id="chatInput" class="form-control" placeholder="Type a message..."
                       aria-label="Message" onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn btn-primary" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
<script>
function addMessage(txt, sender='user'){
    const box=document.getElementById('chatBox');
    const div=document.createElement('div');
    div.className=`mb-2 ${sender==='bot'?'text-start':'text-end'}`;
    const bubble=document.createElement('div');
    bubble.className=`d-inline-block p-2 rounded ${sender==='bot'?'bg-light text-dark':'bg-primary text-white'}`;
    bubble.innerHTML=txt;
    div.appendChild(bubble);
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}
function sendChat(){
    const input=document.getElementById('chatInput');
    const q=input.value.trim(); if(!q) return;
    addMessage(q,'user'); input.value='';
    const pages={dashboard:'dashboard.html','packet analysis':'packet_analysis.html','ml predictions':'ml_predictions.html',visualizations:'visualizations.html','saved captures':'saved_captures.html',settings:'settings.html','ai assistant':'ai_assistant.html'};
    for(const k in pages){
        if(q.toLowerCase().includes('open '+k)||q.toLowerCase()===k){
            addMessage(`Opening <b>${k}</b>...`,'bot');
            setTimeout(()=>location.href=pages[k],1200); return;
        }
    }
    const demos={ 'what is this project':'SafeWeb IDS – Flask-based IDS with ML & rule-engine.',
                  'who made you':'Created by Asmit Kumar & contributors.',
                  'how to use':'Navigate via navbar or ask me to open a page.'};
    for(const key in demos) if(q.toLowerCase().includes(key)){
        addMessage(demos[key],'bot'); return;
    }
    addMessage('I can open pages or answer basic questions.','bot');
}
</script>
</body>
</html>
